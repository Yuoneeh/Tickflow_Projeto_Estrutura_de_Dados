<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TickFlow — Compra Confirmada!</title>
<link rel="stylesheet" href="style.css">
<style>
.success-wrap { min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; padding: 40px; }
.success-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 60px; text-align: center; max-width: 480px; width: 100%; animation: fadeUp .5s ease; }
.success-icon { width: 80px; height: 80px; background: rgba(232,255,71,.1); border: 2px solid var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; font-size: 36px; }
.success-title { font-family: var(--font-display); font-size: 40px; letter-spacing: .04em; margin-bottom: 12px; }
.success-sub { color: var(--muted); font-size: 15px; line-height: 1.7; margin-bottom: 32px; }
.ticket-code { background: var(--bg2); border: 1px dashed rgba(232,255,71,.4); border-radius: 8px; padding: 20px; margin-bottom: 32px; }
.code-label { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 8px; }
.code-val   { font-family: var(--font-mono); font-size: 22px; font-weight: 700; color: var(--neon); letter-spacing: .1em; }
.details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; text-align: left; }
.detail-item  { background: var(--bg2); border-radius: 6px; padding: 12px 16px; }
.detail-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; }
.detail-val   { font-size: 14px; font-weight: 500; }
</style>
</head>
<body>
<nav class="topbar">
  <a class="logo" href="home.html">TICK<span>FLOW</span></a>
</nav>

<div class="success-wrap">
  <div class="success-card">
    <div class="success-icon">🎟️</div>
    <h2 class="success-title">COMPRA CONFIRMADA!</h2>
    <p class="success-sub" id="successSub">Seu ingresso foi comprado com sucesso!</p>
    <div class="ticket-code">
      <div class="code-label">Código do ingresso</div>
      <div class="code-val" id="successCode">TF-······</div>
    </div>
    <div class="details-grid" id="detailsGrid"></div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <a href="home.html" class="btn btn-primary btn-full btn-lg">Ver mais shows</a>
      <a href="home.html" class="btn btn-secondary btn-full">Voltar ao catálogo</a>
    </div>
  </div>
</div>

<script>
const resultado = JSON.parse(sessionStorage.getItem("compraResultado") || "{}");
if (resultado.codigo) {
  document.getElementById("successCode").textContent = resultado.codigo;
  document.getElementById("successSub").textContent  = `${resultado.quantidade} ingresso(s) confirmado(s) para ${resultado.usuario}.`;
  document.getElementById("detailsGrid").innerHTML = `
    <div class="detail-item"><div class="detail-label">Quantidade</div><div class="detail-val">${resultado.quantidade}x</div></div>
    <div class="detail-item"><div class="detail-label">Comprador</div><div class="detail-val">${resultado.usuario}</div></div>
    <div class="detail-item"><div class="detail-label">Data/Hora</div><div class="detail-val">${resultado.timestamp}</div></div>
    <div class="detail-item"><div class="detail-label">Status</div><div class="detail-val" style="color:var(--neon)">✓ Confirmado</div></div>
  `;
  sessionStorage.removeItem("compraResultado");
}
</script>
</body>
</html>
