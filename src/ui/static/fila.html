<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TickFlow — Fila de Compra</title>
<link rel="stylesheet" href="style.css">
<style>
.queue-page { padding: 40px; max-width: 900px; margin: 0 auto; }
.queue-header { margin-bottom: 48px; }
.queue-header h2 { font-family: var(--font-display); font-size: 48px; letter-spacing: .04em; margin-bottom: 8px; }
.queue-header p  { color: var(--muted); font-size: 15px; }

/* Waiting */
.queue-waiting { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 60px 32px; text-align: center; margin-bottom: 32px; }
.spinner { width: 60px; height: 60px; border: 3px solid var(--surface2); border-top-color: var(--neon); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 24px; }
.pos-big   { font-family: var(--font-display); font-size: 80px; color: var(--neon); line-height: 1; margin: 20px 0 8px; }
.pos-label { font-size: 12px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
.queue-waiting h3 { font-family: var(--font-display); font-size: 28px; margin-top: 20px; }
.queue-waiting p  { color: var(--muted); font-size: 14px; margin-top: 8px; }

/* Fila list */
.queue-visual { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin-bottom: 32px; }
.queue-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.queue-title-row h3 { font-family: var(--font-display); font-size: 22px; letter-spacing: .04em; }
.queue-badge { background: rgba(232,255,71,.1); border: 1px solid rgba(232,255,71,.3); border-radius: 20px; padding: 4px 14px; font-size: 12px; color: var(--neon); font-weight: 600; }
.queue-list { display: flex; flex-direction: column; gap: 8px; }
.q-item { display: flex; align-items: center; gap: 16px; padding: 14px 18px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; transition: all .3s; animation: slideIn .3s ease; }
.q-item.current { border-color: var(--neon); background: rgba(232,255,71,.05); }
.q-pos { width: 32px; height: 32px; background: var(--surface2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 12px; font-weight: 700; flex-shrink: 0; }
.q-item.current .q-pos { background: var(--neon); color: #080810; }
.q-name   { flex: 1; font-size: 14px; font-weight: 500; }
.q-time   { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }
.q-status { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.q-item.current .q-status { color: var(--neon); }

/* Code note */
.code-note { background: var(--surface); border: 1px solid rgba(232,255,71,.15); border-radius: 8px; padding: 16px 20px; font-size: 13px; color: var(--muted); font-family: var(--font-mono); line-height: 1.8; margin-bottom: 32px; }

/* Purchase form */
.purchase-form { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
.purchase-title { font-family: var(--font-display); font-size: 28px; letter-spacing: .04em; margin-bottom: 8px; }
.purchase-sub   { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
.qty-control { display: flex; align-items: center; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; width: fit-content; }
.qty-btn { width: 44px; height: 44px; background: transparent; border: none; color: var(--text); font-size: 18px; cursor: pointer; transition: all .2s; }
.qty-btn:hover { background: var(--surface); color: var(--neon); }
.qty-display { width: 56px; text-align: center; font-family: var(--font-mono); font-size: 18px; font-weight: 700; border-left: 1px solid var(--border); border-right: 1px solid var(--border); padding: 10px 0; }
.order-summary { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.order-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--muted); margin-bottom: 8px; }
.order-row.total { color: var(--text); font-weight: 600; font-size: 16px; margin-bottom: 0; padding-top: 12px; margin-top: 8px; border-top: 1px solid var(--border); }
.order-total-val { color: var(--neon); font-family: var(--font-display); font-size: 24px; }
.actions-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }

/* Pilha */
.stack-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.stack-title { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 10px; font-family: var(--font-mono); }
.stack-item { font-size: 12px; color: var(--muted); font-family: var(--font-mono); display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.stack-dot { width: 6px; height: 6px; background: var(--surface2); border-radius: 50%; flex-shrink: 0; }
.stack-item.topo .stack-dot { background: var(--neon2); }

@media (max-width: 768px) { .queue-page { padding: 20px; } .form-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<nav class="topbar">
  <a class="logo" href="home.html">TICK<span>FLOW</span></a>
  <div class="topbar-actions">
    <button class="btn btn-secondary btn-sm" id="backBtn">← Voltar</button>
    <div class="user-chip">
      <div class="user-avatar" id="userAvatar">?</div>
      <span class="user-name" id="userName">...</span>
    </div>
  </div>
</nav>

<div class="queue-page animate-in" id="queuePage">
  <div style="text-align:center;padding:80px;color:var(--muted);">Conectando ao servidor...</div>
</div>

<script>
const API      = "http://localhost:5000";
const params   = new URLSearchParams(location.search);
const eventoId = parseInt(params.get("id"));
let evento = null;
let qty    = 1;

document.getElementById("backBtn").onclick = () => window.location.href = `evento.html?id=${eventoId}`;

async function init() {
  try {
    const me = await fetch(`${API}/api/me`, { credentials:"include" });
    if (me.ok) {
      const data = await me.json();
      const nome = data.usuario.nome;
      document.getElementById("userName").textContent   = nome.split(" ")[0];
      document.getElementById("userAvatar").textContent = nome.split(" ").map(n=>n[0]).join("").toUpperCase().slice(0,2);
    }
  } catch {}

  try {
    const eRes = await fetch(`${API}/api/eventos/${eventoId}`, { credentials:"include" });
    evento = await eRes.json();
    document.title = `TickFlow — Fila: ${evento.nome}`;

    // Entra na fila
    const filaRes = await fetch(`${API}/api/fila/entrar`, {
      method: "POST", credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ evento_id: eventoId })
    });
    const filaData = await filaRes.json();
    renderWaiting(filaData.posicao, filaData.fila);
    processarFila(filaData.posicao);
  } catch {
    document.getElementById("queuePage").innerHTML = `<div style="text-align:center;padding:80px;color:var(--muted);">⚠️ Servidor offline. Aguardando o backend do grupo.</div>`;
  }
}

function renderWaiting(posicao, fila) {
  document.getElementById("queuePage").innerHTML = `
    <div class="queue-header">
      <h2>FILA DE COMPRA</h2>
      <p>${evento.nome} — ${evento.local}</p>
    </div>
    <div class="queue-waiting" id="waitingBox">
      <div class="spinner"></div>
      <div class="pos-big" id="posBig">#${posicao}</div>
      <div class="pos-label">sua posição na fila</div>
      <h3>Aguardando sua vez...</h3>
      <p>O sistema está processando os usuários à sua frente.</p>
    </div>
    <div class="queue-visual">
      <div class="queue-title-row">
        <h3>FILA FIFO — Ordem de chegada</h3>
        <span class="queue-badge" id="qBadge">${fila.length} na fila</span>
      </div>
      <div class="queue-list" id="qList">
        ${fila.map((u,i) => `
          <div class="q-item ${u.usuario_atual?"current":""}">
            <div class="q-pos">${i+1}</div>
            <div class="q-name">${u.usuario_atual ? "👤 "+u.nome+" (você)" : u.nome}</div>
            <div class="q-time">${u.timestamp}</div>
            <div class="q-status">${u.usuario_atual ? "aguardando" : "na fila"}</div>
          </div>`).join("")}
      </div>
    </div>
    <div class="code-note">
      <strong style="color:var(--text);">// Estrutura: FilaCompra (FIFO)</strong><br>
      enqueue() — inserção no final: <strong>O(1)</strong><br>
      dequeue() — remoção da frente: <strong>O(1)</strong><br>
      frente()  — peek sem remoção:  <strong>O(1)</strong>
    </div>
  `;
}

function processarFila(posicaoInicial) {
  let pos = posicaoInicial;
  const intervalo = setInterval(async () => {
    try { await fetch(`${API}/api/fila/proximo`, { method:"POST", credentials:"include" }); } catch {}
    pos--;
    const posBig = document.getElementById("posBig");
    const qBadge = document.getElementById("qBadge");
    const qList  = document.getElementById("qList");
    if (posBig) posBig.textContent = `#${pos}`;
    if (qBadge) qBadge.textContent = `${pos} na fila`;
    if (qList && qList.firstElementChild) qList.firstElementChild.remove();

    if (pos <= 1) {
      clearInterval(intervalo);
      try { await fetch(`${API}/api/fila/proximo`, { method:"POST", credentials:"include" }); } catch {}
      renderCompra();
    }
  }, 1500);
}

async function renderCompra() {
  try {
    await fetch(`${API}/api/compra/iniciar`, {
      method: "POST", credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ evento_id: eventoId, quantidade: qty })
    });
  } catch {}

  let pilha = [];
  try {
    const p = await fetch(`${API}/api/pilha/estado`, { credentials:"include" });
    const d = await p.json(); pilha = d.pilha || [];
  } catch {}

  document.getElementById("queuePage").innerHTML = `
    <div class="queue-header">
      <h2>COMPRAR INGRESSO</h2>
      <p>${evento.nome} — ${evento.local}</p>
    </div>
    <div class="purchase-form">
      <div class="purchase-title">É A SUA VEZ!</div>
      <p class="purchase-sub">Você tem <strong style="color:var(--neon)">10 minutos</strong> para concluir. Escolha a quantidade e confirme.</p>
      <div class="form-grid">
        <div>
          <div class="input-group" style="margin-bottom:16px;">
            <label>Quantidade de ingressos</label>
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty(-1)">−</button>
              <div class="qty-display" id="qtyDisplay">1</div>
              <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
          </div>
          <div class="input-group">
            <label>Tipo de ingresso</label>
            <select id="tipoIngresso" onchange="updateSummary()">
              <option value="1">Pista — R$ ${evento.preco.toLocaleString("pt-BR")}</option>
              <option value="1.8">VIP — R$ ${(evento.preco*1.8).toLocaleString("pt-BR")}</option>
              <option value="2.5">Camarote — R$ ${(evento.preco*2.5).toLocaleString("pt-BR")}</option>
            </select>
          </div>
        </div>
        <div class="order-summary" id="orderSummary">${summaryHTML()}</div>
      </div>
      <div class="actions-row">
        <button class="btn btn-primary btn-lg" onclick="confirmar()" style="flex:1;">🎟️ Confirmar Compra</button>
        <button class="btn btn-secondary" onclick="desfazer()">↩️ Desfazer</button>
      </div>
      <div class="stack-panel">
        <div class="stack-title">// PilhaAcoes (LIFO) — histórico de ações</div>
        <div id="stackList">${renderStack(pilha)}</div>
      </div>
    </div>
  `;
}

function summaryHTML() {
  const mult    = parseFloat(document.getElementById("tipoIngresso")?.value || "1");
  const preco   = Math.round(evento.preco * mult);
  const sub     = preco * qty;
  const taxa    = Math.round(sub * .1);
  return `
    <div class="order-row"><span>Ingresso (${qty}x)</span><span>R$ ${sub.toLocaleString("pt-BR")}</span></div>
    <div class="order-row"><span>Taxa de serviço</span><span>R$ ${taxa.toLocaleString("pt-BR")}</span></div>
    <div class="order-row total"><span>Total</span><span class="order-total-val">R$ ${(sub+taxa).toLocaleString("pt-BR")}</span></div>`;
}

function updateSummary() {
  const el = document.getElementById("orderSummary"); if (el) el.innerHTML = summaryHTML();
}

async function changeQty(delta) {
  const maxDisp = Math.min(10, evento.ingressos - evento.vendidos);
  qty = Math.max(1, Math.min(maxDisp, qty + delta));
  document.getElementById("qtyDisplay").textContent = qty;
  updateSummary();
  try {
    const res  = await fetch(`${API}/api/compra/quantidade`, { method:"POST", credentials:"include", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ quantidade: qty }) });
    const data = await res.json();
    document.getElementById("stackList").innerHTML = renderStack(data.pilha || []);
  } catch {}
}

async function desfazer() {
  try {
    const res  = await fetch(`${API}/api/compra/desfazer`, { method:"POST", credentials:"include" });
    const data = await res.json();
    if (data.ok) {
      showToast(`↩️ Desfeito: ${data.desfeito.descricao}`, "success");
      if (data.desfeito.tipo === "ALTERAR_QUANTIDADE") {
        const ant = (data.pilha||[]).find(a => a.tipo === "ALTERAR_QUANTIDADE");
        qty = ant ? ant.payload.quantidade : 1;
        document.getElementById("qtyDisplay").textContent = qty;
        updateSummary();
      }
      document.getElementById("stackList").innerHTML = renderStack(data.pilha || []);
    } else showToast("Nada para desfazer", "error");
  } catch { showToast("Servidor offline", "error"); }
}

async function confirmar() {
  try {
    const res  = await fetch(`${API}/api/compra/confirmar`, {
      method: "POST", credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ evento_id: eventoId, quantidade: qty })
    });
    const data = await res.json();
    if (data.ok) {
      sessionStorage.setItem("compraResultado", JSON.stringify(data.resultado));
      window.location.href = "sucesso.html";
    } else showToast(data.erro || "Erro ao confirmar compra", "error");
  } catch { showToast("Servidor offline", "error"); }
}

function renderStack(pilha) {
  if (!pilha.length) return `<div class="stack-item"><div class="stack-dot"></div>Pilha vazia</div>`;
  return pilha.slice(0,6).map((a,i) => `
    <div class="stack-item ${i===0?"topo":""}">
      <div class="stack-dot"></div>
      ${i===0?"← TOPO | ":""}${a.descricao}
    </div>`).join("");
}

function showToast(msg, type="success") {
  const c = document.getElementById("toastContainer");
  const t = document.createElement("div"); t.className = `toast ${type}`;
  t.innerHTML = `<span>${type==="success"?"✓":"⚠"}</span> ${msg}`;
  c.appendChild(t); setTimeout(() => t.remove(), 3500);
}

init();
</script>
</body>
</html>
